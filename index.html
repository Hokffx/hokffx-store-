<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hokffx Store</title>

<!-- PREMIUM FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

/* BODY */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #4c00ff, #0a001a 70%);
    color: white;
    overflow-x: hidden;
}

/* GLOW BACKGROUND */
body::before {
    content: "";
    position: fixed;
    width: 600px;
    height: 600px;
    background: #a200ff;
    filter: blur(220px);
    top: -150px;
    left: -150px;
    opacity: 0.5;
    z-index: -1;
}

/* HEADER */
.header {
    text-align: center;
    padding: 40px 20px 20px;
}

.header p {
    color: #c084fc;
    letter-spacing: 4px;
    font-size: 12px;
}

/* 🔥 PREMIUM STORE NAME */
.header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 46px;
    font-weight: 800;
    letter-spacing: 3px;

    background: linear-gradient(120deg, #ffffff, #e879f9, #9333ea);
    -webkit-background-clip: text;
    color: transparent;

    text-shadow: 
        0 0 10px rgba(255,255,255,0.4),
        0 0 20px rgba(168,85,247,0.6),
        0 0 40px rgba(147,51,234,0.9);

    position: relative;
}

/* SHINE ANIMATION */
.header h1::after {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.8), transparent);
    animation: shine 3s infinite;
}

@keyframes shine {
    0% { left: -100%; }
    100% { left: 100%; }
}

/* CONTAINER */
.container {
    max-width: 420px;
    margin: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 35px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.05);
    border-radius: 25px;
    overflow: hidden;
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 0 40px rgba(162, 0, 255, 0.3);
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-5px) scale(1.02);
    box-shadow: 0 0 60px rgba(255, 0, 255, 0.7);
}

.card img {
    width: 100%;
    display: block;
}

/* CONTENT */
.content {
    padding: 25px;
}

/* TITLE */
.title {
    font-size: 24px;
    font-weight: 600;
}

/* PRICE */
.price {
    font-size: 30px;
    font-weight: 800;
    background: linear-gradient(90deg, #ff00cc, #c084fc);
    -webkit-background-clip: text;
    color: transparent;
}

.old {
    text-decoration: line-through;
    color: #aaa;
    margin-right: 10px;
}

/* ACCESS */
.access {
    font-size: 12px;
    letter-spacing: 2px;
    color: #bbb;
    margin-top: 5px;
}

/* INPUT */
.input {
    margin-top: 18px;
    margin-bottom: 12px;
    width: 100%;
    padding: 14px;
    border-radius: 30px;
    border: none;
    outline: none;
    text-align: center;
    background: rgba(255,255,255,0.08);
    color: white;
}

.input:focus {
    box-shadow: 0 0 15px #c084fc;
}

/* 🔥 PREMIUM BUTTON */
.btn {
    display: block;
    width: 100%;
    padding: 16px;
    border-radius: 40px;
    background: linear-gradient(135deg, #ff00cc, #7b00ff);
    color: white;
    text-decoration: none;
    font-weight: 700;
    text-align: center;
    letter-spacing: 1.5px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(255, 0, 255, 0.5);
    transition: 0.3s ease;
}

/* BUTTON SHINE */
.btn::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.7), transparent);
    transition: 0.5s;
}

.btn:hover::before {
    left: 100%;
}

.btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 0 50px rgba(255, 0, 255, 1);
}

/* NOTE */
.note {
    font-size: 11px;
    opacity: 0.7;
    margin-top: 8px;
}

</style>
</head>

<body>

<div class="header">
    <p>👑 PREMIUM GAMING TOOLS 👑</p>
    <h1>Hokffx Store</h1>
</div>

<div class="container">

<!-- iPhone -->
<div class="card">
    <img src="iphone-auxilio.png">
    <div class="content">
        <div class="title">iPhone Auxilio</div>

        <div>
            <span class="old">₹1200</span>
            <span class="price">₹450</span>
        </div>

        <div class="access">PERMANENT ACCESS</div>

        <input type="email" id="email1" class="input" placeholder="Enter your Gmail">

        <a href="#" class="btn"
        onclick="order('email1','https://razorpay.me/@enjoymenthub?amount=B3GVR7kTFeLelIPkLbK6rA%3D%3D')">
        🛒 BUY NOW
        </a>

        <div class="note">Delivery will be sent to your Gmail</div>
    </div>
</div>

<!-- Android -->
<div class="card">
    <img src="android-auxilio.png">
    <div class="content">
        <div class="title">Android Auxilio</div>

        <div>
            <span class="old">₹799</span>
            <span class="price">₹349</span>
        </div>

        <div class="access">PERMANENT ACCESS</div>

        <input type="email" id="email2" class="input" placeholder="Enter your Gmail">

        <a href="#" class="btn"
        onclick="order('email2','https://razorpay.me/@enjoymenthub?amount=Wgh2WqgWWdyx7%2BiKKkCs3Q%3D%3D')">
        🛒 BUY NOW
        </a>

        <div class="note">Delivery will be sent to your Gmail</div>
    </div>
</div>

</div>

<script>
function order(emailId, paymentLink) {
    let email = document.getElementById(emailId).value;

    if (email === "" || !email.includes("@")) {
        alert("Enter valid Gmail!");
        return;
    }

    let yourEmail = "forenjoymenthub@gmail.com";

    let subject = "New Order - Hokffx Store";
    let body = "Customer Gmail: " + email;

    window.location.href =
    `mailto:${yourEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

    setTimeout(() => {
        window.open(paymentLink, "_blank");
    }, 800);
}
</script>

</body>
</html>
