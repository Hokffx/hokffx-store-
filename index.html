<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hokffx Store</title>

<!-- PREMIUM FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #3a0070, #0a001a 70%);
    color: white;
    overflow-x: hidden;
}

/* BACKGROUND GLOW */
body::before {
    content: "";
    position: fixed;
    width: 600px;
    height: 600px;
    background: #a200ff;
    filter: blur(220px);
    top: -150px;
    left: -150px;
    opacity: 0.4;
    z-index: -1;
}

/* HEADER */
.header {
    text-align: center;
    padding: 40px 20px;
}

.header p {
    color: #d48bff;
    letter-spacing: 4px;
    font-size: 12px;
}

/* PREMIUM STORE NAME */
.header h1 {
    font-size: 40px;
    font-weight: 800;

    background: linear-gradient(90deg, #ffffff, #ff00cc, #7b2ff7);
    -webkit-background-clip: text;
    color: transparent;

    text-shadow:
        0 0 20px rgba(255,0,200,0.6),
        0 0 40px rgba(123,47,247,0.6);
}

/* CONTAINER */
.container {
    max-width: 420px;
    margin: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 35px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.05);
    border-radius: 25px;
    overflow: hidden;
    backdrop-filter: blur(25px);

    border: 1px solid rgba(255,255,255,0.12);

    box-shadow:
        0 0 30px rgba(162,0,255,0.3),
        inset 0 0 20px rgba(255,255,255,0.05);

    transition: 0.4s;
}

.card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow:
        0 0 60px rgba(255,0,255,0.8),
        inset 0 0 20px rgba(255,255,255,0.1);
}

/* IMAGE */
.card img {
    width: 100%;
}

/* CONTENT */
.content {
    padding: 20px;
}

/* TITLE */
.title {
    font-size: 24px;
    font-weight: 600;

    background: linear-gradient(90deg, #fff, #c084fc);
    -webkit-background-clip: text;
    color: transparent;
}

/* PRICE */
.price {
    font-size: 30px;
    font-weight: 800;
    background: linear-gradient(90deg, #ff00cc, #c084fc);
    -webkit-background-clip: text;
    color: transparent;
}

.old {
    text-decoration: line-through;
    color: #aaa;
    margin-right: 10px;
}

/* ACCESS */
.access {
    margin-top: 5px;
    font-size: 12px;
    letter-spacing: 2px;
    color: #bbb;
}

/* INPUT */
.input {
    margin-top: 15px;
    width: 100%;
    padding: 14px;
    border-radius: 30px;
    border: none;
    outline: none;
    text-align: center;

    background: rgba(255,255,255,0.08);
    color: white;

    backdrop-filter: blur(10px);
}

.input:focus {
    box-shadow: 0 0 20px #c084fc;
}

/* PREMIUM BUTTON */
.btn {
    position: relative;
    margin-top: 15px;
    width: 100%;
    padding: 15px;
    border-radius: 40px;

    background: linear-gradient(135deg, #ff00cc, #7b2ff7);
    color: white;
    font-weight: 600;
    text-align: center;

    border: none;
    overflow: hidden;

    box-shadow:
        0 0 20px rgba(255,0,200,0.7),
        0 0 40px rgba(123,47,247,0.6);

    transition: 0.3s;
}

/* GLOW LAYER */
.btn::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 40px;
    background: linear-gradient(135deg, #ff00cc, #7b2ff7);
    filter: blur(12px);
    opacity: 0.7;
    z-index: -1;
}

/* HOVER */
.btn:hover {
    transform: scale(1.05);
    box-shadow:
        0 0 40px rgba(255,0,200,1),
        0 0 70px rgba(123,47,247,1);
}

/* CLICK */
.btn:active {
    transform: scale(0.96);
}

/* NOTE */
.note {
    font-size: 11px;
    opacity: 0.7;
    margin-top: 6px;
}

</style>
</head>

<body>

<div class="header">
    <p>👑 PREMIUM GAMING TOOLS 👑</p>
    <h1>Hokffx Store</h1>
</div>

<div class="container">

<!-- iPhone -->
<div class="card">
    <img src="iphone-auxilio.png">

    <div class="content">
        <div class="title">iPhone Auxilio</div>

        <div>
            <span class="old">₹1200</span>
            <span class="price">₹450</span>
        </div>

        <div class="access">PERMANENT ACCESS</div>

        <input type="email" id="email1" class="input" placeholder="Enter your Gmail">

        <a href="#" class="btn"
        onclick="order('email1','https://razorpay.me/@enjoymenthub?amount=B3GVR7kTFeLelIPkLbK6rA%3D%3D')">
        🛒 BUY NOW
        </a>

        <div class="note">Delivery will be sent to your Gmail</div>
    </div>
</div>

<!-- Android -->
<div class="card">
    <img src="android-auxilio.png">

    <div class="content">
        <div class="title">Android Auxilio</div>

        <div>
            <span class="old">₹799</span>
            <span class="price">₹349</span>
        </div>

        <div class="access">PERMANENT ACCESS</div>

        <input type="email" id="email2" class="input" placeholder="Enter your Gmail">

        <a href="#" class="btn"
        onclick="order('email2','https://razorpay.me/@enjoymenthub?amount=Wgh2WqgWWdyx7%2BiKKkCs3Q%3D%3D')">
        🛒 BUY NOW
        </a>

        <div class="note">Delivery will be sent to your Gmail</div>
    </div>
</div>

</div>

<script>
function order(emailId, paymentLink) {
    let email = document.getElementById(emailId).value;

    if (email === "" || !email.includes("@")) {
        alert("Enter valid Gmail!");
        return;
    }

    let yourEmail = "forenjoymenthub@gmail.com";

    let subject = "New Order - Hokffx Store";
    let body = "Customer Gmail: " + email;

    window.location.href =
    `mailto:${yourEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

    setTimeout(() => {
        window.open(paymentLink, "_blank");
    }, 800);
}
</script>

</body>
</html>
